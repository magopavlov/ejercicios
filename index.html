<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14161b">
<title>Programa Semanal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14161b; --surface:#1b1f27; --surface2:#242a35; --line:#2c3242;
    --text:#eceff3; --text-muted:#8892a3; --accent:#ff5b39; --accent-soft:rgba(255,91,57,.16);
    --joint:#3fd6c6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
  body{padding-bottom:60px;}
  h1,h2,h3,.display{font-family:'Barlow Condensed',sans-serif; font-weight:700; letter-spacing:.01em;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  header.top{position:sticky; top:0; z-index:30; background:linear-gradient(180deg,var(--bg) 70%, transparent); padding:14px 16px 8px;}
  header.top .brand{display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px;}
  header.top .brand h1{font-size:22px; margin:0; text-transform:uppercase; letter-spacing:.04em;}
  nav.days{display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; padding-bottom:4px;}
  nav.days::-webkit-scrollbar{display:none;}
  nav.days button{flex:0 0 auto; background:var(--surface); border:1px solid var(--line); color:var(--text-muted);
    padding:8px 12px; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:15px;
    font-weight:600; letter-spacing:.03em; text-transform:uppercase; cursor:pointer;}
  nav.days button .n{font-family:'IBM Plex Mono',monospace; font-size:10px; opacity:.6; display:block; margin-bottom:1px;}
  nav.days button.active{background:var(--accent-soft); border-color:var(--accent); color:var(--accent);}
  main{padding:12px 16px 40px;}
  section.day{display:none;}
  section.day.active{display:block; animation:dayIn .2s ease;}
  @keyframes dayIn{ from{opacity:0; transform:translateX(10px);} to{opacity:1; transform:translateX(0);} }
  .daytitle{margin:6px 0 2px;}
  .daytitle h2{font-size:30px; margin:0; text-transform:uppercase;}
  .daytitle .sub{color:var(--accent); font-family:'IBM Plex Mono',monospace; font-size:12px; text-transform:uppercase; letter-spacing:.08em;}
  .block{margin-top:22px;}
  .block > h3{font-size:19px; margin:0 0 8px; text-transform:uppercase; color:var(--text); border-bottom:1px solid var(--line); padding-bottom:6px;}
  .block > h3 .cat{color:var(--text-muted); font-weight:500; font-size:13px; font-family:'IBM Plex Mono',monospace; text-transform:none; letter-spacing:0;}
  ul.plain{list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:6px;}
  ul.plain li{background:var(--surface); border:1px solid var(--line); border-radius:8px; padding:9px 12px 9px 10px; font-size:14px; display:flex; align-items:center; gap:10px;}
  ul.plain li .txt{flex:1; display:flex; justify-content:space-between; gap:10px;}
  ul.plain li .dur{color:var(--text-muted); font-family:'IBM Plex Mono',monospace; font-size:12px; white-space:nowrap;}
  ul.plain li.done .txt > span:first-child{color:var(--text-muted); text-decoration:line-through;}
  .subgroup{margin-top:14px;}
  .subgroup > .label{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--text-muted); margin-bottom:6px; font-family:'IBM Plex Mono',monospace;}
  .exrow{display:flex; align-items:stretch; gap:8px; margin-bottom:8px;}
  .exrow.done details.ex{opacity:.55;}
  .exrow.done .name{text-decoration:line-through;}
  details.ex{flex:1; background:var(--surface); border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  details.ex[open]{border-color:#3a4258;}
  details.ex summary{list-style:none; cursor:pointer; padding:11px 12px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
  details.ex summary::-webkit-details-marker{display:none;}
  details.ex summary .name{font-size:15.5px; font-weight:600;}
  details.ex summary .right{display:flex; align-items:center; gap:10px; flex:0 0 auto;}
  details.ex summary .sets{color:var(--accent); font-family:'IBM Plex Mono',monospace; font-size:13px; white-space:nowrap;}
  details.ex summary .chev{color:var(--text-muted); font-size:12px; transition:transform .2s;}
  details.ex[open] summary .chev{transform:rotate(180deg);}
  details.ex .body{padding:0 12px 14px;}
  details.ex .tech{font-size:13.5px; color:var(--text-muted); line-height:1.5; margin:0;}
  .checkwrap{flex:0 0 auto; display:flex; align-items:center; justify-content:center; width:44px;}
  input.check{appearance:none; -webkit-appearance:none; width:26px; height:26px; border-radius:8px; border:2px solid var(--line);
    background:var(--surface); cursor:pointer; position:relative; flex:0 0 auto;}
  input.check:checked{background:var(--accent); border-color:var(--accent);}
  input.check:checked::after{content:"✓"; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#14161b; font-size:16px; font-weight:700;}
  .progress{font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--text-muted); margin:2px 0 0;}
  .progress b{color:var(--accent);}
  .resetbtn{background:none; border:1px solid var(--line); color:var(--text-muted); font-family:'IBM Plex Mono',monospace;
    font-size:11px; padding:4px 9px; border-radius:7px; cursor:pointer; text-transform:uppercase; letter-spacing:.04em;}
  .infobox{background:var(--surface); border:1px solid var(--line); border-radius:10px; padding:14px 16px; margin-bottom:14px;}
  .infobox h3{margin:0 0 8px; font-size:18px; text-transform:uppercase;}
  .infobox ul{margin:0; padding-left:18px; font-size:14px; color:var(--text-muted); line-height:1.6;}
  .infobox p{font-size:14px; color:var(--text-muted); line-height:1.6; margin:0 0 8px;}
  .voltable{width:100%; border-collapse:collapse; font-size:13px; margin-top:6px;}
  .voltable td{padding:5px 4px; border-bottom:1px solid var(--line);}
  .voltable td:last-child{text-align:right; font-family:'IBM Plex Mono',monospace; color:var(--accent);}
</style>
</head>
<body>

  <div class="brand"><h1>Programa Semanal</h1></div>
  <nav class="days" id="dayNav"></nav>
</header>
<main id="main"></main>

/* ============ Render ============ */
let CHECK_ID = 0;
function exerciseCard(e, dayKey){
  const id = `${dayKey}_${CHECK_ID++}`;
  return `<div class="exrow" data-id="${id}">
    <label class="checkwrap"><input type="checkbox" class="check" data-id="${id}"></label>
    <details class="ex"><summary><span class="name">${e.name}</span>
      <span class="right"><span class="sets mono">${e.sets}</span><span class="chev">▾</span></span></summary>
      <div class="body"><p class="tech">${e.tech}</p></div></details>
  </div>`;
}
function textBlock(sec, dayKey){
  const note = sec.note ? `<div class="dur" style="margin-bottom:6px;">${sec.note}</div>` : "";
  const items = sec.items.map(i=>{
    const id = `${dayKey}_${CHECK_ID++}`;
    let a=i, b="";
    if(i.includes("·")){ [a,b]=i.split("·"); }
    return `<li data-id="${id}"><label class="checkwrap" style="width:34px;"><input type="checkbox" class="check" data-id="${id}"></label>
      <span class="txt"><span>${a.trim()}</span><span class="dur">${b.trim()}</span></span></li>`;
  }).join("");
  return `<div class="block"><h3>${sec.title}${sec.dur?` <span class="cat">${sec.dur}</span>`:""}</h3>${note}<ul class="plain">${items}</ul></div>`;
}
function groupsBlock(sec, dayKey){
  const groups = sec.groups.map(g=>`<div class="subgroup"><div class="label">${g.label}</div>${g.items.map(e=>exerciseCard(e,dayKey)).join("")}</div>`).join("");
  return `<div class="block"><h3>${sec.title}</h3>${groups}</div>`;
}

function renderDay(day){
  if(day.info) return infoPage();
  const sections = day.sections.map(sec => sec.type==="text" ? textBlock(sec, day.key) : groupsBlock(sec, day.key)).join("");
  return `<div class="daytitle"><h2>${day.label}</h2><div class="sub">${day.sub}</div>
    <div style="display:flex; align-items:center; justify-content:space-between; margin-top:8px;">
      <div class="progress" id="prog-${day.key}"></div>
      <button class="resetbtn" data-reset="${day.key}">Reiniciar día</button>
    </div></div>${sections}`;
}

/* ---- Persistencia (localStorage, con reinicio semanal automático) ---- */
const STORE_KEY = "rutina_checks_v1";
const WEEK_KEY = "rutina_week_v1";
function mondayOf(d){
  d = new Date(d);
  const day = (d.getDay()+6)%7;
  d.setDate(d.getDate()-day);
  d.setHours(0,0,0,0);
  return d.toISOString().slice(0,10);
}
function loadChecks(){
  const thisMonday = mondayOf(new Date());
  if(localStorage.getItem(WEEK_KEY) !== thisMonday){
    localStorage.setItem(STORE_KEY, "{}");
    localStorage.setItem(WEEK_KEY, thisMonday);
  }
  try{ return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); }catch(e){ return {}; }
}
let checks = {};
function saveChecks(){ localStorage.setItem(STORE_KEY, JSON.stringify(checks)); }

function updateProgress(dayKey){
  const section = document.getElementById("day-"+dayKey);
  if(!section) return;
  const boxes = section.querySelectorAll("input.check");
  const total = boxes.length;
  const done = [...boxes].filter(b=>b.checked).length;
  const el = document.getElementById("prog-"+dayKey);
  if(el) el.innerHTML = total ? `<b>${done}</b>/${total} completados` : "";
}

function applyChecksToDOM(){
  document.querySelectorAll("input.check").forEach(box=>{
    const id = box.dataset.id;
    box.checked = !!checks[id];
    const row = box.closest(".exrow") || box.closest("li");
    if(row) row.classList.toggle("done", box.checked);
  });
  DAYS.forEach(d => { if(!d.info) updateProgress(d.key); });
}

function init(){
  const nav = document.getElementById("dayNav");
  const main = document.getElementById("main");
  DAYS.forEach((day, idx) => {
    const btn = document.createElement("button");
    btn.innerHTML = `<span class="n">${day.num}</span>${day.label}`;
    btn.dataset.key = day.key;
    if(idx===0) btn.classList.add("active");
    btn.addEventListener("click", () => selectDay(day.key));
    nav.appendChild(btn);
    const section = document.createElement("section");
    section.className = "day" + (idx===0 ? " active" : "");
    section.id = "day-" + day.key;
    section.innerHTML = renderDay(day);
    main.appendChild(section);
  });
  let currentKey = DAYS[0].key;
  function selectDay(key){
    currentKey = key;
    document.querySelectorAll("nav.days button").forEach(b => b.classList.toggle("active", b.dataset.key===key));
    document.querySelectorAll("section.day").forEach(s => s.classList.toggle("active", s.id==="day-"+key));
    const activeBtn = nav.querySelector(`button[data-key="${key}"]`);
    if(activeBtn && activeBtn.scrollIntoView) activeBtn.scrollIntoView({behavior:"smooth", inline:"center", block:"nearest"});
    window.scrollTo({top:0, behavior:"instant"});
  }

  // --- Deslizar para cambiar de día ---
  let touchStartX=0, touchStartY=0, touchStartT=0;
  main.addEventListener("touchstart", (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX; touchStartY = t.clientY; touchStartT = Date.now();
  }, {passive:true});
  main.addEventListener("touchend", (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const dt = Date.now() - touchStartT;
    if(Math.abs(dx) > 65 && Math.abs(dx) > Math.abs(dy) * 1.6 && dt < 700){
      const idx = DAYS.findIndex(d => d.key === currentKey);
      const target = dx < 0 ? DAYS[idx+1] : DAYS[idx-1];
      if(target) selectDay(target.key);
    }
  }, {passive:true});

  checks = loadChecks();
  applyChecksToDOM();

  main.addEventListener("change", (e) => {
    if(!e.target.classList.contains("check")) return;
    const id = e.target.dataset.id;
    checks[id] = e.target.checked;
    saveChecks();
    const row = e.target.closest(".exrow") || e.target.closest("li");
    if(row) row.classList.toggle("done", e.target.checked);
    const dayKey = id.split("_")[0];
    updateProgress(dayKey);
  });

  main.addEventListener("click", (e) => {
    const btn = e.target.closest(".resetbtn");
    if(!btn) return;
    const dayKey = btn.dataset.reset;
    const section = document.getElementById("day-"+dayKey);
    section.querySelectorAll("input.check").forEach(box=>{
      checks[box.dataset.id] = false;
      box.checked = false;
      const row = box.closest(".exrow") || box.closest("li");
      if(row) row.classList.remove("done");
    });
    saveChecks();
    updateProgress(dayKey);
  });
}
document.addEventListener("DOMContentLoaded", init);
if("serviceWorker" in navigator){
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
</script>
